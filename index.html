<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderna</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <div class="calculadora">
        <div class="display">
        </div>

        <div class="buttons">
            <button class="btn btn-clear clear col-span-2">C</button>
            <button class="btn btn-del delete">DEL</button>
            <button class="btn btn-num operator">÷</button>

            <button class="btn btn-num">7</button>
            <button class="btn btn-num">8</button>
            <button class="btn btn-num">9</button>
            <button class="btn btn-num operator">x</button>

            <button class="btn btn-num">4</button>
            <button class="btn btn-num">5</button>
            <button class="btn btn-num">6</button>
            <button class="btn btn-num operator">-</button>

            <button class="btn btn-num">1</button>
            <button class="btn btn-num">2</button>
            <button class="btn btn-num">3</button>
            <button class="btn btn-num operator">+</button>

            <button class="btn btn-num col-span-2">0</button>
            <button class="btn btn-num">.</button>
            <button class="btn btn-eq equals">=</button>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
